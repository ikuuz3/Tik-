<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التحدي الاحترافي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: sans-serif; background-color: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الأزرار العائمة */
        .floating-controls { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; z-index: 50; }
        .btn-float { background: rgba(255,255,255,0.2); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; backdrop-filter: blur(5px); }

        /* الشبكة التي تملأ الشاشة */
        .grid-container { display: grid; gap: 2px; height: 100vh; width: 100%; padding: 0; }
        .country-card { display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        .counter { font-size: 5rem; font-weight: 900; color: white; text-shadow: 3px 3px 5px rgba(0,0,0,0.5); }
        .info-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; width: 90%; }
        .gift-img { width: 60px; height: 60px; object-fit: contain; }
        .name-text { font-size: 1.8rem; font-weight: bold; }
        .flag-text { font-size: 2rem; }

        /* نافذة الإعدادات */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; overflow-y: auto; }
        .modal-content { background: #1c1c1c; padding: 20px; border-radius: 20px; color: white; }
        .close-modal { background: #ff3b30; color: white; padding: 10px; border-radius: 10px; border: none; width: 100%; margin-bottom: 20px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .save-btn { background: #4cd137; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="floating-controls">
        <button class="btn-float" onclick="openModal()">⚙️</button>
        <button class="btn-float" onclick="resetCounters()">🔄</button>
    </div>

    <div class="grid-container" id="gridContainer"></div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">إغلاق الإعدادات ❌</button>
            <h3>الإعدادات</h3>
            <label>عدد المربعات:</label>
            <input type="number" id="countInput" onchange="visibleCount = this.value">
            <hr>
            <h4>إضافة دولة:</h4>
            <input type="text" id="nameIn" placeholder="اسم الدولة">
            <input type="text" id="flagIn" placeholder="العلم">
            <input type="file" id="giftIn" accept="image/*">
            <button class="save-btn" onclick="addCountry()">إضافة</button>
            <div id="manageList" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        let countries = JSON.parse(localStorage.getItem('data')) || [{id:1, name:"الجزائر", flag:"🇩🇿", count:0, gift:"", bg:"#00a8ff"}, {id:2, name:"السعودية", flag:"🇸🇦", count:0, gift:"", bg:"#4cd137"}];
        let visibleCount = localStorage.getItem('limit') || 2;

        function render() {
            const cont = document.getElementById('gridContainer');
            cont.innerHTML = '';
            const cols = visibleCount > 1 ? 2 : 1;
            cont.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            
            countries.slice(0, visibleCount).forEach(c => {
                const card = document.createElement('div');
                card.className = 'country-card';
                card.style.backgroundColor = c.bg;
                card.onclick = () => { c.count++; save(); render(); };
                card.innerHTML = `<div class="counter">${c.count}</div>
                                  <div class="info-row">
                                    ${c.gift ? `<img src="${c.gift}" class="gift-img">` : ''}
                                    <span class="name-text">${c.name}</span>
                                    <span class="flag-text">${c.flag}</span>
                                  </div>`;
                cont.appendChild(card);
            });
        }

        function save() { localStorage.setItem('data', JSON.stringify(countries)); localStorage.setItem('limit', visibleCount); }
        function openModal() { document.getElementById('settingsModal').style.display = 'block'; }
        function closeModal() { document.getElementById('settingsModal').style.display = 'none'; }
        function resetCounters() { countries.forEach(c => c.count = 0); save(); render(); }
        function addCountry() { /* نفس منطق الإضافة السابق */ render(); }
        
        render();
    </script>
</body>
</html>
