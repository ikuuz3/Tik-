<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي تيك توك الاحترافي</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* الأزرار العائمة الذكية فوق المربعات */
        .floating-btn {
            position: absolute;
            top: 12px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 48px;
            height: 48px;
            font-size: 1.4rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }
        .floating-btn:active { transform: scale(0.9); }
        #settingsBtn { left: 12px; } /* أقصى اليسار العلوي */
        #resetBtn { right: 12px; }   /* أقصى اليمين العلوي */

        /* شبكة المربعات الديناميكية - شاشة واحدة دائماً */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            padding: 4px;
            height: 100vh;
            width: 100vw;
            background-color: #000000;
        }

        .country-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* العداد الرقمي الكبير المجسم */
        .counter {
            font-size: 4.8rem;
            font-weight: 900;
            font-family: Arial, sans-serif;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.8), -1px -1px 0px rgba(0,0,0,0.4);
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* هوية البلد الكبيرة والواضحة (بدون إطار أسود سفلي) */
        .country-identity-row {
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.7rem; /* حجم كبير واضح جداً */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
        }

        .gift-img {
            width: 48px; /* حجم هديّة كبير ومتناسق */
            height: 48px;
            object-fit: contain;
        }

        .flag-text {
            font-size: 1.9rem;
        }

        /* نافذة الإعدادات الشاملة المحدثة */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal-content {
            background: #1c1c1f;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #2d2d35;
            color: #ffffff;
        }

        .modal-content h3 { margin-bottom: 15px; border-bottom: 1px solid #2d2d35; padding-bottom: 8px; color: #00a8ff;}
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.9rem;}
        
        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px;
            border: 1px solid #2d2d35; background: #0f0f11; color: #fff;
        }

        .manage-list {
            margin-top: 15px; background: #252529; padding: 10px; border-radius: 10px;
        }
        .manage-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid #323239;
        }
        .delete-btn { background: #ff3b30; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;}

        .modal-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .save-btn { background: #4cd137; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;}
        .close-top-btn { background: #e84118; color: white; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; width: 100%; text-align: center;}

        /* الألوان المشعة الافتراضية */
        .bg-1 { background-color: #00a8ff; } .bg-2 { background-color: #4cd137; }
        .bg-3 { background-color: #fbc531; } .bg-4 { background-color: #9c88ff; }
        .bg-5 { background-color: #e84118; } .bg-6 { background-color: #487eb0; }
        .bg-7 { background-color: #00cec9; } .bg-8 { background-color: #6c5ce7; }
        .bg-9 { background-color: #ed4c67; } .bg-10 { background-color: #12cbd6; }
        .bg-11 { background-color: #ff7f50; } .bg-12 { background-color: #2ed573; }
    </style>
</head>
<body>

    <!-- الأزرار العائمة في الزوايا العلوية للشاشة -->
    <button class="floating-btn" id="settingsBtn" onclick="openModal()" title="الإعدادات">⚙️</button>
    <button class="floating-btn" id="resetBtn" onclick="resetCounters()" title="إعادة تصفير العدادات">🔄</button>

    <!-- شبكة العرض التفاعلية (ملء الشاشة بالكامل) -->
    <div class="grid-container" id="gridContainer"></div>

    <!-- نافذة الإعدادات الشاملة والكاملة -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <!-- زر الخروج والعودة من الإعدادات في الأعلى -->
            <button class="close-top-btn" onclick="closeModal()">❌ إغلاق وتراجع</button>
            
            <h3>⚙️ إعدادات التحكم</h3>
            
            <!-- التحكم في العدد -->
            <label>عدد المربعات المراد عرضها بالشاشة:</label>
            <input type="number" id="allowedCountInput" min="1" max="12" onchange="updateVisibleCount(this.value)">

            <hr style="border-color:#2d2d35; margin:15px 0;">

            <!-- إضافة دولة جديدة -->
            <h4 style="color: #4cd137;">➕ إضافة دولة جديدة:</h4>
            <label>اسم الدولة:</label>
            <input type="text" id="newCountryName" placeholder="مثال: قطر">
            <label>علم الدولة (إيموجي):</label>
            <input type="text" id="newCountryFlag" placeholder="مثال: 🇶🇦">
            <label>صورة الهدية من جهازك:</label>
            <input type="file" id="newCountryGift" accept="image/*">
            <button class="save-btn" style="width:100%; padding:8px; border-radius:6px; margin-top:5px; margin-bottom:15px;" onclick="addNewCountryItem()">إضافة إلى القائمة</button>

            <!-- إدارة الدول الحالية -->
            <label>📊 إدارة وحذف الدول المسجلة:</label>
            <div class="manage-list" id="manageListContainer"></div>
            
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveAndApplySettings()">💾 حفظ الإعدادات وتطبيق</button>
            </div>
        </div>
    </div>

    <script>
        // المصفوفة الأصلية الكاملة للدول
        const defaultCountries = [
            { id: 1, name: "الجزائر", flag: "🇩🇿", count: 0, gift: "", bg: "bg-1" },
            { id: 2, name: "السعودية", flag: "🇸🇦", count: 0, gift: "", bg: "bg-2" },
            { id: 3, name: "المغرب", flag: "🇲🇦", count: 0, gift: "", bg: "bg-3" },
            { id: 4, name: "مصر", flag: "🇪🇬", count: 0, gift: "", bg: "bg-4" },
            { id: 5, name: "العراق", flag: "🇮🇶", count: 0, gift: "", bg: "bg-5" },
            { id: 6, name: "سوريا", flag: "🇸🇾", count: 0, gift: "", bg: "bg-6" },
            { id: 7, name: "تونس", flag: "🇹🇳", count: 0, gift: "", bg: "bg-7" },
            { id: 8, name: "الإمارات", flag: "🇦🇪", count: 0, gift: "", bg: "bg-8" }
        ];

        let countries = JSON.parse(localStorage.getItem('tik_challenge_countries')) || defaultCountries;
        let visibleCount = parseInt(localStorage.getItem('tik_challenge_limit')) || 8;
        let temporaryGiftBase64 = "";

        // معالج رفع الصور وتحويلها لـ Base64 لضمان حفظها بالهاتف
        document.getElementById('newCountryGift').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    temporaryGiftBase64 = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // دالة بناء وعرض شبكة المربعات لتملأ الشاشة بدقة 100% بدون تمرير
        function renderGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            
            const displayList = countries.slice(0, visibleCount);
            const rowsCount = Math.ceil(displayList.length / 2);
            
            // تقسيم الأسطر ديناميكياً بالتساوي لتملأ الـ 100vh تماماً
            container.style.gridTemplateRows = `repeat(${rowsCount}, 1fr)`;

            displayList.forEach(country => {
                const card = document.createElement('div');
                card.className = `country-card ${country.bg || 'bg-1'}`;
                card.setAttribute('onclick', `incrementCount(${country.id})`);

                // العداد الرقمي
                const counter = document.createElement('div');
                counter.className = 'counter';
                counter.id = `counter-${country.id}`;
                counter.innerText = country.count;
                card.appendChild(counter);

                // سطر الهوية الكبير (هدية -> اسم -> علم) من اليمين لليسار بدون أي خلفية سوداء مشوهة
                const identityRow = document.createElement('div');
                identityRow.className = 'country-identity-row';

                // 1. صورة الهدية
                if (country.gift) {
                    const img = document.createElement('img');
                    img.src = country.gift;
                    img.className = 'gift-img';
                    identityRow.appendChild(img);
                }

                // 2. اسم الدولة
                const nameSpan = document.createElement('span');
                nameSpan.className = 'name-text';
                nameSpan.innerText = country.name;
                identityRow.appendChild(nameSpan);

                // 3. علم الدولة
                const flagSpan = document.createElement('span');
                flagSpan.className = 'flag-text';
                flagSpan.innerText = country.flag;
                identityRow.appendChild(flagSpan);

                card.appendChild(identityRow);
                container.appendChild(card);
            });
        }

        function incrementCount(id) {
            const country = countries.find(c => c.id === id);
            if (country) {
                country.count++;
                const el = document.getElementById(`counter-${id}`);
                if (el) el.innerText = country.count;
                saveToStorage();
            }
        }

        function openModal() {
            document.getElementById('allowedCountInput').value = visibleCount;
            buildManageList();
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function buildManageList() {
            const container = document.getElementById('manageListContainer');
            container.innerHTML = '';
            countries.forEach((country, index) => {
                const item = document.createElement('div');
                item.className = 'manage-item';
                item.innerHTML = `
                    <span>${index + 1}. ${country.flag} ${country.name} (${country.count})</span>
                    <button class="delete-btn" onclick="deleteCountryItem(${country.id})">حذف</button>
                `;
                container.appendChild(item);
            });
        }

        function addNewCountryItem() {
            const name = document.getElementById('newCountryName').value.trim();
            const flag = document.getElementById('newCountryFlag').value.trim();
            
            if(!name) { alert("الرجاء إدخال اسم الدولة!"); return; }

            const nextId = countries.length > 0 ? Math.max(...countries.map(c => c.id)) + 1 : 1;
            const randomBgNumber = Math.floor(Math.random() * 12) + 1;

            const newCountry = {
                id: nextId,
                name: name,
                flag: flag || "🏳️",
                count: 0,
                gift: temporaryGiftBase64,
                bg: `bg-${randomBgNumber}`
            };

            countries.push(newCountry);
            
            document.getElementById('newCountryName').value = "";
            document.getElementById('newCountryFlag').value = "";
            document.getElementById('newCountryGift').value = "";
            temporaryGiftBase64 = "";

            buildManageList();
        }

        function deleteCountryItem(id) {
            countries = countries.filter(c => c.id !== id);
            buildManageList();
        }

        function updateVisibleCount(val) {
            let num = parseInt(val);
            if (num < 1) num = 1;
            if (num > 12) num = 12;
            visibleCount = num;
        }

        function saveAndApplySettings() {
            localStorage.setItem('tik_challenge_limit', visibleCount);
            saveToStorage();
            renderGrid();
            closeModal();
        }

        function resetCounters() {
            if (confirm("هل أنت متأكد من تصفير كل العدادات لبدء تحدي جديد؟")) {
                countries.forEach(c => c.count = 0);
                saveToStorage();
                renderGrid();
            }
        }

        function saveToStorage() {
            localStorage.setItem('tik_challenge_countries', JSON.stringify(countries));
        }

        // التشغيل التلقائي فور فتح الصفحة
        renderGrid();
    </script>
</body>
</html>
