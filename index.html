<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي التيك توك الاحترافي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: sans-serif; background-color: #0f0f11; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* الأزرار العائمة */
        .float-btn { position: absolute; top: 10px; z-index: 20; background: rgba(0,0,0,0.5); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #settingsBtn { left: 10px; }
        #resetBtn { right: 10px; }

        /* الشبكة التي تملأ الشاشة */
        .grid-container { display: grid; width: 100vw; height: 100vh; gap: 2px; padding: 2px; }
        .country-card { display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 10px; position: relative; }
        
        .counter { font-size: 5rem; font-weight: 900; color: white; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); flex-grow: 1; display: flex; align-items: center; }
        .info-row { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.8rem; font-weight: bold; color: white; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 8px; }
        .gift-img { width: 50px; height: 50px; object-fit: contain; }

        /* نافذة الإعدادات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; overflow-y: auto; }
        .modal-content { background: #1c1c1f; padding: 20px; border-radius: 16px; color: white; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; }
        .save-btn { background: #4cd137; color: white; font-weight: bold; }
        .close-btn { background: #ff3b30; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <button class="float-btn" id="settingsBtn" onclick="openModal()">⚙️</button>
    <button class="float-btn" id="resetBtn" onclick="resetCounters()">🔄</button>

    <div class="grid-container" id="gridContainer"></div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>⚙️ الإعدادات</h3>
            <label>عدد المربعات:</label>
            <input type="number" id="countInput" value="8">
            <button class="save-btn" onclick="saveSettings()">💾 حفظ الإعدادات</button>
            <button class="close-btn" onclick="closeModal()">❌ إغلاق</button>
        </div>
    </div>

    <script>
        let countries = JSON.parse(localStorage.getItem('countries')) || [
            {name:"الجزائر", flag:"🇩🇿", count:0, bg:"#00a8ff"}, {name:"السعودية", flag:"🇸🇦", count:0, bg:"#4cd137"},
            {name:"المغرب", flag:"🇲🇦", count:0, bg:"#fbc531"}, {name:"مصر", flag:"🇪🇬", count:0, bg:"#9c88ff"},
            {name:"العراق", flag:"🇮🇶", count:0, bg:"#e84118"}, {name:"سوريا", flag:"🇸🇾", count:0, bg:"#487eb0"},
            {name:"تونس", flag:"🇹🇳", count:0, bg:"#00cec9"}, {name:"الإمارات", flag:"🇦🇪", count:0, bg:"#6c5ce7"}
        ];

        function render() {
            const container = document.getElementById('gridContainer');
            const limit = parseInt(localStorage.getItem('limit')) || 8;
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(2, 1fr)`;
            
            countries.slice(0, limit).forEach((c, i) => {
                const card = document.createElement('div');
                card.className = 'country-card';
                card.style.backgroundColor = c.bg;
                card.onclick = () => { c.count++; render(); localStorage.setItem('countries', JSON.stringify(countries)); };
                card.innerHTML = `<div class="counter">${c.count}</div><div class="info-row"><span>${c.name}</span><span>${c.flag}</span></div>`;
                container.appendChild(card);
            });
        }

        function openModal() { document.getElementById('settingsModal').style.display = 'block'; }
        function closeModal() { document.getElementById('settingsModal').style.display = 'none'; }
        function saveSettings() { localStorage.setItem('limit', document.getElementById('countInput').value); render(); closeModal(); }
        function resetCounters() { if(confirm("تصفير؟")) { countries.forEach(c => c.count = 0); render(); } }

        render();
    </script>
</body>
</html>
